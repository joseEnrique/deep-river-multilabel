# Configuración principal del grid de experimentos

dataset: ai4i

model:
  # ── LSTM
  - architecture:  [LSTM]
    optimizer:     [adam]
    past_history:  [1, 2,  10]
    window_size:   [1, 50, 200]
    hidden_dim:    [32, 64, 128]
    num_layers:    [1, 2, 3]
    lr:            [0.01, 0.001, 0.0001]
    dropout:       [0.2, 0]
    bidirectional: [false, true]
    normalization: ["none", layernorm, batchnorm]
    seed:          [42]
    epochs:        [1, 5]

  # ── MLP (flattened sequence, bidirectional=False implicitly)
  - architecture:  [MLP]
    optimizer:     [adam]
    past_history:  [1, 2, 5, 10]
    window_size:   [1, 50, 200]
    hidden_dims:   [[128, 64, 32], [128, 64], [64, 32], [32, 32, 32], [64, 64, 64], [128, 128, 128]]
    lr:            [0.01, 0.001, 0.0001]
    dropout:       [0.2, 0]
    normalization: ["none", layernorm, batchnorm]
    seed:          [42]
    epochs:        [1, 5]

  # ── CNN
  - architecture:  [CNN]
    optimizer:     [adam]
    past_history:  [1, 2, 10]
    window_size:   [1, 50, 200]
    hidden_dim:    [32, 64, 128]
    num_layers:    [1, 2, 3]
    lr:            [0.01, 0.001, 0.0001]
    dropout:       [0.2, 0]
    normalization: ["none", layernorm, batchnorm]
    seed:          [42]
    epochs:        [1, 5]

  # ── Transformer
  - architecture:  [Transformer]
    optimizer:     [adam]
    past_history:  [1, 2,  10]
    window_size:   [1, 50, 200]
    hidden_dim:    [32, 64, 128]
    num_layers:    [1, 2, 3]
    lr:            [0.01, 0.001, 0.0001]
    dropout:       [0.2, 0]
    normalization: ["none", layernorm, batchnorm]
    seed:          [42]
    epochs:        [1, 5]

loss:
  - type: BCE

  - type: StaticFocal
    alpha: 0.25
    gamma: 2.0

  - type: AdaptiveFocal
    base_gamma: 2.0
    base_alpha: 0.25
    decay: 0.999
    alpha_gain: 1.0
    gamma_gain: 2.0

checkpoint_every: 1000
results_dir: results
db_path: experiments.db
final_results_file: results/final_results.csv
