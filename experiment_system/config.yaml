# Configuración principal del grid de experimentos
# Producto cartesiano de model × loss
#
# Total ejemplo:
#   2 arch × 3 h × 3 nl × 6 w × 3 lr × 2 opt × 4 ph × 2 datasets × 4 losses
#   ≈ 10,368 combinaciones  (filtrar según sea necesario)

dataset: ai4i          # sobrescribir en cada sección del grid si se quiere nps

model:
  # ── LSTM
  - architecture:  [LSTM]
    dataset:       [ai4i, nps]
    optimizer:     [adam, sgd]
    past_history:  [1, 2, 5, 10]
    window_size:   [1, 20, 50, 100, 200, 500]
    hidden_dim:    [32, 64, 128]
    num_layers:    [1, 2]
    lr:            [0.01, 0.001]
    dropout:       [0.3]
    bidirectional: [false, true]
    normalization: [none, layernorm] # batchnorm fails with batch_size=1, LayerNorm is standard for RNNs
    seed:          [42]
    epochs:        [1]

  # ── MLP (no sequence length, bidirectional=False implicitly)
  - architecture:  [MLP]
    dataset:       [ai4i, nps]
    optimizer:     [adam, sgd]
    past_history:  [1]
    window_size:   [1, 20, 50, 100, 200, 500]
    hidden_dim:    [32, 64, 128]
    num_layers:    [1, 2]
    lr:            [0.01, 0.001]
    dropout:       [0.3]
    normalization: [none, layernorm, batchnorm]
    seed:          [42]
    epochs:        [1]

  # ── CNN (needs sequence > 2 usually for kernel=3, depending on padding)
  - architecture:  [CNN]
    dataset:       [ai4i, nps]
    optimizer:     [adam, sgd]
    past_history:  [2, 5, 10]
    window_size:   [1, 20, 50, 100, 200, 500]
    hidden_dim:    [32, 64, 128]
    num_layers:    [1, 2]
    lr:            [0.01, 0.001]
    dropout:       [0.3]
    normalization: [none, layernorm, batchnorm]
    seed:          [42]
    epochs:        [1]

  # ── Transformer (LayerNorm as default internal norm)
  - architecture:  [Transformer]
    dataset:       [ai4i, nps]
    optimizer:     [adam, sgd]
    past_history:  [2, 5, 10]
    window_size:   [1, 20, 50, 100, 200, 500]
    hidden_dim:    [32, 64, 128]
    num_layers:    [1, 2]
    lr:            [0.01, 0.001]
    dropout:       [0.3]
    normalization: [layernorm]
    seed:          [42]
    epochs:        [1]

loss:
  - type: BCE

  - type: StaticFocal
    alpha: 0.25
    gamma: 2.0

  - type: AdaptiveFocal
    base_gamma: 2.0
    base_alpha: 0.25
    decay: 0.999
    alpha_gain: 1.0
    gamma_gain: 2.0

checkpoint_every: 500
results_dir: results
db_path: experiments.db
final_results_file: results/final_results.csv
