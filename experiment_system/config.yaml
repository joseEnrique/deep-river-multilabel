# Configuración principal del grid de experimentos

dataset: ai4i

model:
  # ── LSTM
  - architecture:  [LSTM]
    optimizer:     [adam, sgd]
    past_history:  [1, 2, 5, 10]
    window_size:   [1, 20, 50, 100, 200, 500]
    hidden_dim:    [32, 64, 128]
    num_layers:    [1, 2, 3]
    lr:            [0.01, 0.001, 0.0001]
    dropout:       [0.3]
    bidirectional: [false, true]
    normalization: [layernorm, batchnorm]
    seed:          [42]
    epochs:        [1]

  # ── MLP (no sequence length, bidirectional=False implicitly)
  - architecture:  [MLP]
    optimizer:     [adam, sgd]
    past_history:  [1]
    window_size:   [1, 20, 50, 100, 200, 500]
    hidden_dim:    [32, 64, 128]
    num_layers:    [1, 2, 3]
    lr:            [0.01, 0.001, 0.0001]
    dropout:       [0.3]
    normalization: [layernorm, batchnorm]
    seed:          [42]
    epochs:        [1]

  # ── CNN
  - architecture:  [CNN]
    optimizer:     [adam, sgd]
    past_history:  [1, 2, 5, 10]
    window_size:   [1, 20, 50, 100, 200, 500]
    hidden_dim:    [32, 64, 128]
    num_layers:    [1, 2, 3]
    lr:            [0.01, 0.001, 0.0001]
    dropout:       [0.3]
    normalization: [layernorm, batchnorm]
    seed:          [42]
    epochs:        [1]

  # ── Transformer
  - architecture:  [Transformer]
    optimizer:     [adam, sgd]
    past_history:  [1, 2, 5, 10]
    window_size:   [1, 20, 50, 100, 200, 500]
    hidden_dim:    [32, 64, 128]
    num_layers:    [1, 2, 3]
    lr:            [0.01, 0.001, 0.0001]
    dropout:       [0.3]
    normalization: [layernorm, batchnorm]
    seed:          [42]
    epochs:        [1]

loss:
  - type: BCE

  - type: StaticFocal
    alpha: 0.25
    gamma: 2.0

  - type: AdaptiveFocal
    base_gamma: 2.0
    base_alpha: 0.25
    decay: 0.999
    alpha_gain: 1.0
    gamma_gain: 2.0

checkpoint_every: 500
results_dir: results
db_path: experiments.db
final_results_file: results/final_results.csv
